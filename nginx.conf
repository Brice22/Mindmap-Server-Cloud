user root;
events {
    worker_connections 1024;
}

http { 

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Proxy for Keycloak ---
    server {
        listen 8443 ssl;
	server_name _;
        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
	    proxy_redirect http://192.168.4.194/ http://192.168.4.194:8081/;
	    proxy_redirect http://192.168.4.194/ https://192.168.4.194:8443/;
        }
    }

    # --- Proxy for SurrealDB ---
    server {
        listen 8000 ssl;
	server_name _;

	ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://surrealdb:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
	    proxy_set_header X-Forwarded 8001;
        }
    }

# --- Vaultwarden (Secure Port 8001) ---
    server {
        listen 8001 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://vaultwarden:80;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Port https;
        }
        
        # Notifications (Websockets)
        location /notifications/hub {
            proxy_pass http://vaultwarden:3012;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }    
    # --- Proxy for Elasticsearch (Optional, if you want access) ---
    server {
        listen 9201 ssl;
	server_name _;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass https://elasticsearch:9200;
            proxy_ssl_verify off; # Trust the internal self-signed cert
            proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
# --- Jenkins (Secure Port 8080) ---
    server {
        listen 8080 ssl;
        server_name _;
        
        # SSL Settings (Same as others)
        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://jenkins:8080;
            
            # --- THE FIX: Tell Jenkins the Truth ---
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;  # Jenkins reads this
            proxy_set_header X-Forwarded-Port 8080;  # <--- CRITICAL: "I am HTTPS"
            
            # Fix "Reverse Proxy Setup is Broken" warning
            # Jenkins expects the 'Location' header to be rewritten on redirects
            proxy_redirect http:// https://;
            
            # Increase timeout for long-running jobs
            proxy_read_timeout 90s;
        }
    }

# --- Generic Kibana (Secure Port 5602) ---
    server {
        listen 5602 ssl;
        server_name _;

        # SSL Config
        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        location / {
            # Kibana runs HTTP internally on 5601
            proxy_pass http://kibana:5601;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

# --- Meilisearch (Secure Port 7700) ---
    server {
        listen 7700 ssl;
        server_name _;

        # SSL Config
        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        location / {
            proxy_pass http://meilisearch:7700;
            
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
